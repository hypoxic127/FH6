<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FH6 AutoBot — Control Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1>🏎️ FH6 AutoBot</h1>
                <span class="subtitle" data-i18n="subtitle">Forza Horizon 6 AFK Farming</span>
            </div>
            <div class="header-right">
                <!-- QR Hover Popover -->
                <div class="qr-popover-wrap">
                    <button class="btn-icon" id="qr-toggle">📱</button>
                    <div class="qr-popover" id="qr-popover">
                        <div class="qr-popover-title" data-i18n="qrTitle">📱 Scan to access on mobile</div>
                        <div id="qr-canvas"></div>
                        <div id="qr-url" class="qr-url"></div>
                    </div>
                </div>
                <!-- Language Dropdown -->
                <div class="lang-dropdown-wrap">
                    <button class="btn-icon" id="lang-toggle" onclick="toggleLangDropdown()">🌐</button>
                    <div class="lang-dropdown" id="lang-dropdown">
                        <div class="lang-option" data-lang="en" onclick="setLang('en')">
                            <span class="lang-flag">🇺🇸</span> English
                        </div>
                        <div class="lang-option" data-lang="zh" onclick="setLang('zh')">
                            <span class="lang-flag">🇨🇳</span> 中文
                        </div>
                    </div>
                </div>
                <span id="connection-status" class="badge badge-disconnected" data-i18n="disconnected">⚡ Disconnected</span>
            </div>
        </header>

        <!-- Status Cards -->
        <section class="cards">
            <div class="card">
                <div class="card-icon">🎯</div>
                <div class="card-body">
                    <div class="card-label" data-i18n="currentStage">Current Stage</div>
                    <div class="card-value card-value-text" id="current-state">IDLE</div>
                </div>
            </div>
            <div class="card">
                <div class="card-icon">🔄</div>
                <div class="card-body">
                    <div class="card-label" data-i18n="loopCount">Loop Count</div>
                    <div class="card-value card-value-num" id="loop-count">0</div>
                </div>
            </div>
            <div class="card">
                <div class="card-icon">⏱️</div>
                <div class="card-body">
                    <div class="card-label" data-i18n="uptime">Uptime</div>
                    <div class="card-value card-value-num" id="uptime">00<span class="colon">:</span>00<span class="colon">:</span>00</div>
                </div>
            </div>
            <div class="card">
                <div class="card-icon">🎰</div>
                <div class="card-body">
                    <div class="card-label" data-i18n="superWheelspins">Super Wheelspins</div>
                    <div class="card-value card-value-num" id="super-wheelspins">0</div>
                </div>
            </div>
        </section>

        <!-- Stage Progress -->
        <section class="progress-section">
            <div class="progress-bar">
                <div class="progress-stage" id="stage-farm" data-stage="STATE_FARM_POINTS">
                    <span class="stage-icon">🏎️</span>
                    <span class="stage-label" data-i18n="stageFarm">Farm</span>
                </div>
                <div class="progress-connector" id="conn-farm-buy"></div>
                <div class="progress-stage" id="stage-buy" data-stage="STATE_BUY_CARS">
                    <span class="stage-icon">🛒</span>
                    <span class="stage-label" data-i18n="stageBuy">Buy</span>
                </div>
                <div class="progress-connector" id="conn-buy-upgrade"></div>
                <div class="progress-stage" id="stage-upgrade" data-stage="STATE_UPGRADE_CARS">
                    <span class="stage-icon">⚡</span>
                    <span class="stage-label" data-i18n="stageUpgrade">Upgrade</span>
                </div>
                <div class="progress-connector" id="conn-upgrade-sell"></div>
                <div class="progress-stage" id="stage-sell" data-stage="STATE_TRASH_CARS">
                    <span class="stage-icon">🗑️</span>
                    <span class="stage-label" data-i18n="stageSell">Sell</span>
                </div>
            </div>
        </section>

        <!-- Dashboard: Left Controls + Right Log -->
        <section class="dashboard">
            <!-- Left Column: Controls + Guide -->
            <div class="dashboard-left">
                <div class="controls">
                    <div class="control-row">
                        <!-- Custom Select -->
                        <div class="control-group">
                            <label for="stage-select" data-i18n="startStage">Start Stage</label>
                            <div class="select-wrapper">
                                <select id="stage-select">
                                    <option value="STATE_FARM_POINTS" data-i18n="optFarm">🏎️ Farm Skill Points</option>
                                    <option value="STATE_BUY_CARS" data-i18n="optBuy">🛒 Buy Cars</option>
                                    <option value="STATE_UPGRADE_CARS" data-i18n="optUpgrade">⚡ Upgrade Cars</option>
                                    <option value="STATE_TRASH_CARS" data-i18n="optSell">🗑️ Sell Cars</option>
                                </select>
                                <svg class="select-arrow" viewBox="0 0 16 16" fill="none">
                                    <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                        </div>

                        <!-- Toggle Switches -->
                        <div class="control-group">
                            <label class="toggle-label">
                                <div class="toggle-switch">
                                    <input type="checkbox" id="auto-loop">
                                    <span class="toggle-slider"></span>
                                </div>
                                <span data-i18n="autoLoop">Auto Loop</span>
                            </label>
                        </div>
                        <div class="control-group">
                            <label class="toggle-label">
                                <div class="toggle-switch">
                                    <input type="checkbox" id="skip-buy">
                                    <span class="toggle-slider"></span>
                                </div>
                                <span data-i18n="skipBuy">Skip Buy</span>
                            </label>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="control-buttons">
                        <button id="btn-start" class="btn btn-start" onclick="startBot()">
                            <span data-i18n="btnStart">▶ Start Bot</span>
                        </button>
                        <button id="btn-stop" class="btn btn-stop" onclick="stopBot()" disabled>
                            <span data-i18n="btnStop">⏹ Stop Bot</span>
                        </button>
                        <button class="btn btn-clear btn-ghost" onclick="clearLogs()">
                            <span data-i18n="btnClear">🗑 Clear Logs</span>
                        </button>
                    </div>
                </div>

                <!-- Usage Guide -->
                <details class="guide-details">
                    <summary class="guide-summary" data-i18n="guideTitle">📖 Usage Guide</summary>
                    <div class="guide-content" id="guide-content" data-i18n-html="guideContent">
                    </div>
                </details>
            </div>

            <!-- Right Column: Log Console -->
            <div class="dashboard-right">
                <div class="log-section">
                    <div class="log-header">
                        <div class="log-header-left">
                            <div class="traffic-lights">
                                <span class="dot dot-red"></span>
                                <span class="dot dot-yellow"></span>
                                <span class="dot dot-green"></span>
                            </div>
                            <h2 data-i18n="liveLogs">📜 Live Logs</h2>
                        </div>
                        <div class="log-header-right">
                            <span id="log-count" class="log-counter">0 entries</span>
                            <div class="log-toolbar">
                                <button class="toolbar-btn" id="btn-autoscroll" onclick="toggleAutoScroll()" title="Auto Scroll">
                                    <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
                                        <path d="M8 3v10M4 9l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                                <button class="toolbar-btn" onclick="copyLogs()" title="Copy">
                                    <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
                                        <rect x="5" y="5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
                                        <path d="M3 11V3.5A1.5 1.5 0 014.5 2H11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                                    </svg>
                                </button>
                                <button class="toolbar-btn" onclick="downloadLogs()" title="Download">
                                    <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
                                        <path d="M8 2v8M4 7l4 4 4-4M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div id="log-container" class="log-container">
                        <div class="log-empty"><span class="typewriter" id="typewriter-text"></span><span class="blink-cursor">_</span></div>
                    </div>
                </div>
            </div>
        </section>
    </div>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
