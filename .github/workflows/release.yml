name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install packaging/wheels/vgamepad-0.1.0-py3-none-any.whl
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python -m PyInstaller packaging/FH6AutoBot.spec --noconfirm

      - name: Verify build output
        run: |
          if (!(Test-Path "dist/FH6AutoBot.exe")) {
            Write-Error "Build failed: FH6AutoBot.exe not found"
            exit 1
          }
          $size = (Get-Item "dist/FH6AutoBot.exe").Length / 1MB
          Write-Host "Build successful! EXE size: $([math]::Round($size, 1)) MB"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FH6AutoBot.exe
          generate_release_notes: true
          body: |
            ## FH6-AFK ${{ github.ref_name }}

            ### 📥 下载
            下载下方的 **FH6AutoBot.exe**，双击即可运行，无需安装 Python。
            启动后可选择 **Web UI** 或 **控制台** 模式。

            ### 💻 系统要求
            - Windows 10/11 64-bit
            - [Tesseract OCR 5.x](https://github.com/UB-Mannheim/tesseract/releases)
            - [ViGEmBus 驱动](https://github.com/nefarius/ViGEmBus/releases)
            - Forza Horizon 6 (窗口化或无边框模式)
